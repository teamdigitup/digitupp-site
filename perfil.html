<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Meu Perfil — digitUP</title>
<meta property="og:image" content="og-image.jpg"/>
<link rel="icon" type="image/svg+xml" href="favicon.svg"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
<style>
.profile-page{min-height:100vh;padding:100px 20px 60px;display:flex;align-items:flex-start;justify-content:center}
.profile-wrap{width:100%;max-width:860px;display:grid;grid-template-columns:280px 1fr;gap:24px;align-items:start}
.profile-sidebar{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;text-align:center;position:sticky;top:90px}
.profile-avatar{width:88px;height:88px;border-radius:50%;border:3px solid var(--purple);margin:0 auto 16px;display:block;object-fit:cover;box-shadow:0 0 20px rgba(124,58,237,.3)}
.profile-avatar-placeholder{width:88px;height:88px;border-radius:50%;border:3px solid var(--purple);margin:0 auto 16px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:900;color:#fff;box-shadow:0 0 20px rgba(124,58,237,.3)}
.profile-name{font-size:1.1rem;font-weight:800;color:#fff;margin-bottom:4px}
.profile-email{font-size:.78rem;color:var(--muted);margin-bottom:20px;word-break:break-all}
.profile-plan-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:.72rem;font-weight:700;margin-bottom:20px}
.profile-plan-badge.no-plan{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted)}
.profile-plan-badge.has-plan{background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.3);color:var(--purple2)}
.profile-plan-badge svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.5}
.btn-signout{width:100%;padding:10px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#f87171;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-signout:hover{background:rgba(239,68,68,.18);border-color:rgba(239,68,68,.4)}
.btn-signout svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
.profile-main{display:flex;flex-direction:column;gap:20px}
.profile-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px}
.profile-card-title{font-size:.7rem;font-weight:800;color:var(--purple3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.profile-card-title svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:.85rem}
.info-row:last-child{border-bottom:none}
.info-row span:first-child{color:var(--muted)}
.info-row span:last-child{color:#fff;font-weight:600}
.plan-card-active{background:linear-gradient(135deg,rgba(124,58,237,.1),rgba(168,85,247,.05));border:1px solid rgba(124,58,237,.3);border-radius:12px;padding:20px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.plan-card-active.gold{background:linear-gradient(135deg,rgba(251,191,36,.08),rgba(245,158,11,.04));border-color:rgba(251,191,36,.3)}
.plan-name-display{font-size:1.1rem;font-weight:900;color:#fff}
.plan-name-display.gold{color:#fbbf24}
.plan-price-display{font-size:.82rem;color:var(--muted);margin-top:3px}
.plan-date-display{font-size:.72rem;color:var(--muted);margin-top:2px}
.no-plan-box{text-align:center;padding:32px 20px}
.no-plan-box svg{width:40px;height:40px;stroke:var(--muted);fill:none;stroke-width:1.5;margin:0 auto 12px;display:block}
.no-plan-box p{font-size:.85rem;color:var(--muted);margin-bottom:16px}
.plans-grid-mini{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.plan-mini{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:all .2s;text-align:center}
.plan-mini:hover{border-color:var(--purple);transform:translateY(-2px)}
.plan-mini.featured{border-color:var(--purple);background:rgba(124,58,237,.06)}
.plan-mini-name{font-size:.82rem;font-weight:800;color:#fff;margin-bottom:3px}
.plan-mini-price{font-size:.72rem;color:var(--muted)}
.plan-mini-btn{margin-top:10px;width:100%;padding:8px;background:var(--grad);border:none;color:#fff;border-radius:7px;font-size:.75rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.plan-mini-btn:hover{opacity:.9}
.plan-mini-btn.gold{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#04040a}
#loadingState{text-align:center;padding:60px 20px;color:var(--muted);font-size:.9rem}
#loadingState svg{width:32px;height:32px;stroke:var(--purple2);fill:none;stroke-width:2;margin:0 auto 12px;display:block;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){
  .profile-wrap{grid-template-columns:1fr}
  .profile-sidebar{position:static}
  .plans-grid-mini{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="nav-slot"></div>

<div class="profile-page">
  <div id="loadingState">
    <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
    Carregando perfil...
  </div>

  <div class="profile-wrap" id="profileWrap" style="display:none">
    <!-- SIDEBAR -->
    <div class="profile-sidebar">
      <div id="avatarWrap"></div>
      <div class="profile-name" id="profileName">—</div>
      <div class="profile-email" id="profileEmail">—</div>
      <div class="profile-plan-badge no-plan" id="planBadge">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Sem plano ativo
      </div>
      <button class="btn-signout" id="signOutBtn">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sair da conta
      </button>
    </div>

    <!-- MAIN -->
    <div class="profile-main">
      <!-- INFO -->
      <div class="profile-card">
        <div class="profile-card-title">
          <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Informações da Conta
        </div>
        <div class="info-row"><span>Nome</span><span id="infoName">—</span></div>
        <div class="info-row"><span>E-mail</span><span id="infoEmail">—</span></div>
        <div class="info-row"><span>Conta criada via</span><span>Google</span></div>
        <div class="info-row"><span>Membro desde</span><span id="infoDate">—</span></div>
      </div>

      <!-- PLAN -->
      <div class="profile-card">
        <div class="profile-card-title">
          <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          Meu Plano
        </div>
        <div id="planSection"></div>
      </div>

      <!-- QUICK LINKS -->
      <div class="profile-card">
        <div class="profile-card-title">
          <svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
          Acesso Rápido
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <a href="comecar.html" style="background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:14px;text-decoration:none;transition:all .2s;display:flex;align-items:center;gap:10px" onmouseenter="this.style.borderColor='rgba(124,58,237,.4)'" onmouseleave="this.style.borderColor='var(--border)'">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--purple2)" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
            <div><div style="font-size:.82rem;font-weight:700;color:#fff">Começar</div><div style="font-size:.7rem;color:var(--muted)">Métodos para iniciantes</div></div>
          </a>
          <a href="planos.html" style="background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:14px;text-decoration:none;transition:all .2s;display:flex;align-items:center;gap:10px" onmouseenter="this.style.borderColor='rgba(124,58,237,.4)'" onmouseleave="this.style.borderColor='var(--border)'">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--purple2)" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
            <div><div style="font-size:.82rem;font-weight:700;color:#fff">Planos</div><div style="font-size:.7rem;color:var(--muted)">Para empresas</div></div>
          </a>
          <a href="vip.html" style="background:var(--card2);border:1px solid rgba(251,191,36,.2);border-radius:10px;padding:14px;text-decoration:none;transition:all .2s;display:flex;align-items:center;gap:10px" onmouseenter="this.style.borderColor='rgba(251,191,36,.4)'" onmouseleave="this.style.borderColor='rgba(251,191,36,.2)'">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            <div><div style="font-size:.82rem;font-weight:700;color:#fff">Grupo VIP</div><div style="font-size:.7rem;color:var(--muted)">Comunidade exclusiva</div></div>
          </a>
          <a href="contato.html" style="background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:14px;text-decoration:none;transition:all .2s;display:flex;align-items:center;gap:10px" onmouseenter="this.style.borderColor='rgba(124,58,237,.4)'" onmouseleave="this.style.borderColor='var(--border)'">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--purple2)" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <div><div style="font-size:.82rem;font-weight:700;color:#fff">Suporte</div><div style="font-size:.7rem;color:var(--muted)">Fale com a equipe</div></div>
          </a>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="footer-slot"></div>
<div id="modal-slot"></div>
<script src="components.js"></script>
<script src="main.js"></script>
<script type="module">
import { onAuth, getUserData, signOutUser, savePlan } from './auth.js';

onAuth(async (user) => {
  document.getElementById('loadingState').style.display = 'none';

  if (!user) {
    window.location.href = 'login.html';
    return;
  }

  document.getElementById('profileWrap').style.display = 'grid';

  // Avatar
  const avatarWrap = document.getElementById('avatarWrap');
  if (user.photoURL) {
    avatarWrap.innerHTML = '<img src="' + user.photoURL + '" class="profile-avatar" alt="Avatar"/>';
  } else {
    const initials = (user.displayName || 'U').split(' ').map(n => n[0]).join('').slice(0,2).toUpperCase();
    avatarWrap.innerHTML = '<div class="profile-avatar-placeholder">' + initials + '</div>';
  }

  // Basic info
  const name = user.displayName || 'Usuário';
  const email = user.email || '';
  document.getElementById('profileName').textContent = name;
  document.getElementById('profileEmail').textContent = email;
  document.getElementById('infoName').textContent = name;
  document.getElementById('infoEmail').textContent = email;

  // Date
  const created = user.metadata?.creationTime
    ? new Date(user.metadata.creationTime).toLocaleDateString('pt-BR', {day:'2-digit',month:'long',year:'numeric'})
    : '—';
  document.getElementById('infoDate').textContent = created;

  // Firestore data
  const data = await getUserData(user.uid);
  renderPlan(data, user.uid);

  // Sign out
  document.getElementById('signOutBtn').addEventListener('click', () => {
    if (confirm('Deseja sair da sua conta?')) signOutUser();
  });
});

function renderPlan(data, uid) {
  const badge = document.getElementById('planBadge');
  const section = document.getElementById('planSection');

  if (data?.plan) {
    const isGold = data.plan.toLowerCase().includes('dominar') || data.plan.toLowerCase().includes('enterprise') || data.plan.toLowerCase().includes('vip');
    badge.className = 'profile-plan-badge has-plan';
    badge.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>' + data.plan;
    if (isGold) badge.style.cssText = 'background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);color:#fbbf24';

    const dateStr = data.planDate?.toDate
      ? data.planDate.toDate().toLocaleDateString('pt-BR', {day:'2-digit',month:'long',year:'numeric'})
      : 'Recentemente';

    section.innerHTML =
      '<div class="plan-card-active ' + (isGold ? 'gold' : '') + '">' +
        '<div>' +
          '<div class="plan-name-display ' + (isGold ? 'gold' : '') + '">' + data.plan + '</div>' +
          '<div class="plan-price-display">' + (data.planPrice || '') + '</div>' +
          '<div class="plan-date-display">Ativo desde ' + dateStr + '</div>' +
        '</div>' +
        '<button onclick="window.goToWhatsApp(\'' + data.plan + '\',\'Suporte\')" style="background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text);padding:8px 16px;border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap">Falar com suporte</button>' +
      '</div>' +
      '<p style="font-size:.78rem;color:var(--muted);margin-top:14px">Para alterar ou cancelar seu plano, entre em contato pelo WhatsApp.</p>';
  } else {
    section.innerHTML =
      '<div class="no-plan-box">' +
        '<svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>' +
        '<p>Você ainda não tem um plano ativo.<br>Escolha abaixo para começar.</p>' +
      '</div>' +
      '<div class="plans-grid-mini">' +
        '<div class="plan-mini"><div class="plan-mini-name">digitUP</div><div class="plan-mini-price">R$199,99/mês</div><button class="plan-mini-btn" onclick="selectPlan(\'' + uid + '\',\'Método digitUP\',\'R$199,99/mês\')">Selecionar</button></div>' +
        '<div class="plan-mini"><div class="plan-mini-name" style="color:#fbbf24">Dominar</div><div class="plan-mini-price">R$349,99/mês</div><button class="plan-mini-btn gold" onclick="selectPlan(\'' + uid + '\',\'Método Dominar\',\'R$349,99/mês\')">Selecionar</button></div>' +
        '<div class="plan-mini"><div class="plan-mini-name">Starter</div><div class="plan-mini-price">R$497/mês</div><button class="plan-mini-btn" onclick="selectPlan(\'' + uid + '\',\'Plano Starter\',\'R$497/mês\')">Selecionar</button></div>' +
        '<div class="plan-mini featured"><div class="plan-mini-name">Growth</div><div class="plan-mini-price">R$1.497/mês</div><button class="plan-mini-btn" onclick="selectPlan(\'' + uid + '\',\'Plano Growth\',\'R$1.497/mês\')">Selecionar</button></div>' +
        '<div class="plan-mini"><div class="plan-mini-name">Enterprise</div><div class="plan-mini-price">R$3.497/mês</div><button class="plan-mini-btn" onclick="selectPlan(\'' + uid + '\',\'Plano Enterprise\',\'R$3.497/mês\')">Selecionar</button></div>' +
        '<div class="plan-mini"><div class="plan-mini-name" style="color:#fbbf24">VIP</div><div class="plan-mini-price">R$297/mês</div><button class="plan-mini-btn gold" onclick="selectPlan(\'' + uid + '\',\'Grupo VIP\',\'R$297/mês\')">Selecionar</button></div>' +
      '</div>';
  }
}

window.selectPlan = async function(uid, planName, planPrice) {
  await savePlan(uid, planName, planPrice);
  window.goToWhatsApp(planName, planPrice);
  const data = await getUserData(uid);
  renderPlan(data, uid);
  window.showToast('Plano ' + planName + ' selecionado!');
};
</script>
</body>
</html>
