<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <style>
      .rocket { animation: launch 1.8s ease-in-out infinite; transform-origin: 32px 32px; }
      .flame1 { animation: flicker 0.3s ease-in-out infinite alternate; transform-origin: 32px 46px; }
      .flame2 { animation: flicker 0.3s ease-in-out infinite alternate-reverse; transform-origin: 32px 46px; }
      @keyframes launch {
        0%,100% { transform: translateY(0px); }
        50% { transform: translateY(-4px); }
      }
      @keyframes flicker {
        0% { transform: scaleY(1) scaleX(1); opacity:1; }
        100% { transform: scaleY(1.3) scaleX(0.85); opacity:0.8; }
      }
    </style>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <g class="rocket">
    <!-- Body -->
    <ellipse cx="32" cy="28" rx="7" ry="13" fill="#fff" opacity="0.95"/>
    <!-- Nose -->
    <path d="M32 10 C28 16 25 20 25 24 L39 24 C39 20 36 16 32 10Z" fill="#e0d4ff"/>
    <!-- Wings -->
    <path d="M25 34 L18 42 L25 40Z" fill="#c084fc"/>
    <path d="M39 34 L46 42 L39 40Z" fill="#c084fc"/>
    <!-- Window -->
    <circle cx="32" cy="26" r="3.5" fill="#7c3aed"/>
    <circle cx="32" cy="26" r="2" fill="#ddd6fe"/>
    <!-- Flame 1 (outer) -->
    <ellipse class="flame1" cx="32" cy="44" rx="5" ry="7" fill="#f59e0b" opacity="0.9"/>
    <!-- Flame 2 (inner) -->
    <ellipse class="flame2" cx="32" cy="44" rx="3" ry="5" fill="#fef3c7" opacity="0.95"/>
  </g>
</svg>
