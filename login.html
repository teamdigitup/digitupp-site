<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Entrar — digitUP</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
<style>
body{display:flex;flex-direction:column;min-height:100vh}
.login-page{flex:1;display:flex;align-items:center;justify-content:center;padding:80px 20px 40px;position:relative;overflow:hidden}
.login-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 40%,rgba(124,58,237,.1) 0%,transparent 55%),radial-gradient(ellipse at 75% 70%,rgba(168,85,247,.06) 0%,transparent 50%);pointer-events:none}
.login-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(124,58,237,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(124,58,237,.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
.login-card{background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:44px;width:100%;max-width:420px;position:relative;z-index:1;box-shadow:0 24px 80px rgba(0,0,0,.5)}
.login-logo{display:flex;align-items:center;justify-content:center;gap:10px;font-size:1.4rem;font-weight:900;color:#fff;margin-bottom:28px}
.login-logo .nav-logo-mark{width:36px;height:36px;background:linear-gradient(135deg,#7c3aed,#a855f7);border-radius:9px;display:flex;align-items:center;justify-content:center}
.login-logo .nav-logo-mark svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2.5}
.login-title{font-size:1.5rem;font-weight:900;color:#fff;text-align:center;margin-bottom:6px;letter-spacing:-.3px}
.login-sub{font-size:.85rem;color:var(--muted);text-align:center;margin-bottom:28px}
.google-btn{
  width:100%;padding:14px;background:#fff;border:none;border-radius:10px;
  display:flex;align-items:center;justify-content:center;gap:12px;
  font-size:.92rem;font-weight:700;color:#1f1f1f;cursor:pointer;
  transition:all .2s;box-shadow:0 2px 12px rgba(0,0,0,.15);font-family:inherit;
}
.google-btn:hover{background:#f8f8f8;box-shadow:0 4px 20px rgba(0,0,0,.2);transform:translateY(-1px)}
.google-btn:active{transform:translateY(0)}
.google-btn svg{flex-shrink:0}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--muted);font-size:.75rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.login-note{background:rgba(124,58,237,.06);border:1px solid rgba(124,58,237,.15);border-radius:10px;padding:14px 16px;font-size:.78rem;color:var(--muted);line-height:1.6;margin-top:20px;text-align:center}
.login-note strong{color:var(--purple2)}
.login-back{display:inline-flex;align-items:center;gap:6px;font-size:.8rem;color:var(--muted);position:absolute;top:20px;left:20px;transition:color .2s;z-index:2}
.login-back:hover{color:var(--purple2)}
.login-back svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
.trust-row{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:18px;flex-wrap:wrap}
.trust-item{display:flex;align-items:center;gap:5px;font-size:.72rem;color:var(--muted)}
.trust-item svg{width:12px;height:12px;stroke:var(--green);fill:none;stroke-width:2.5}
#loginStatus{text-align:center;font-size:.82rem;margin-top:14px;min-height:20px;color:var(--purple2)}
#loginStatus.error{color:var(--red)}
</style>
</head>
<body>
<div class="login-page">
  <div class="login-bg"></div>
  <div class="login-grid"></div>

  <a href="index.html" class="login-back">
    <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Voltar
  </a>

  <div class="login-card">
    <div class="login-logo">
      <div class="nav-logo-mark">
        <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </div>
      digit<span style="color:#c084fc">UP</span>
    </div>

    <div class="login-title">Acesse sua conta</div>
    <p class="login-sub">Entre com sua conta Google para acessar a plataforma digitUP</p>

    <button class="google-btn" onclick="signInWithGoogle()" id="googleBtn">
      <svg width="20" height="20" viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continuar com Google
    </button>

    <div id="loginStatus"></div>

    <div class="login-note">
      Ao entrar, você concorda com nossos <strong>Termos de Uso</strong> e <strong>Política de Privacidade</strong>. Seus dados são protegidos e nunca compartilhados.
    </div>

    <div class="trust-row">
      <span class="trust-item"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Conexão segura</span>
      <span class="trust-item"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>Dados criptografados</span>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getAnalytics } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js';

  // ── CONFIGURE YOUR FIREBASE PROJECT HERE ──────────────────────
  // Ative Authentication → Sign-in method → Google no Firebase Console
  const firebaseConfig = {
    apiKey: "AIzaSyBABR6dd2flf-bvQpXEjU4zuowndf8K4qg",
    authDomain: "digitupp-7fce6.firebaseapp.com",
    projectId: "digitupp-7fce6",
    storageBucket: "digitupp-7fce6.firebasestorage.app",
    messagingSenderId: "127841996798",
    appId: "1:127841996798:web:78a2a79cc824783a39baaf",
    measurementId: "G-LY56X979HR"
  };
  // ──────────────────────────────────────────────────────────────

  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  // Check if already logged in
  onAuthStateChanged(auth, (user) => {
    if (user) {
      setStatus('Bem-vindo, ' + user.displayName + '! Redirecionando...', false);
      setTimeout(() => { window.location.href = 'index.html'; }, 1500);
    }
  });

  window.signInWithGoogle = async function() {
    const btn = document.getElementById('googleBtn');
    const status = document.getElementById('loginStatus');
    btn.disabled = true;
    btn.textContent = 'Entrando...';
    try {
      const result = await signInWithPopup(auth, provider);
      const user = result.user;
      setStatus('Bem-vindo, ' + user.displayName + '!', false);
      setTimeout(() => { window.location.href = 'index.html'; }, 1200);
    } catch (err) {
      btn.disabled = false;
      btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg> Continuar com Google';
      if (err.code === 'auth/popup-closed-by-user') {
        setStatus('Login cancelado.', true);
      } else if (err.code === 'auth/configuration-not-found' || err.code === 'auth/invalid-api-key') {
        setStatus('Configure o Firebase no arquivo login.html para ativar o login.', true);
      } else {
        setStatus('Erro ao entrar. Tente novamente.', true);
      }
    }
  };

  function setStatus(msg, isError) {
    const el = document.getElementById('loginStatus');
    el.textContent = msg;
    el.className = isError ? 'error' : '';
  }
</script>
</body>
</html>
